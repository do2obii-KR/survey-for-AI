<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 AI 서비스 추천 설문조사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .option-label { transition: all 0.2s ease-in-out; border: 2px solid transparent; }
        .option-label:hover { border-color: #cbd5e1; background-color: #f1f5f9; }
        input[type="radio"]:checked + .option-content {
            border-color: #3b82f6; background-color: #eff6ff; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
        }
        input[type="checkbox"]:checked + .option-content {
            border-color: #8b5cf6; background-color: #f5f3ff; box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.1);
        }
        input[type="checkbox"]:disabled + .option-content {
            opacity: 0.5; cursor: not-allowed; border-color: transparent; background-color: #f8fafc;
        }
        .loader {
            border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col items-center py-10 px-4 sm:px-6 lg:px-8">

    <div class="w-full max-w-3xl mb-8 text-center">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">나에게 딱 맞는 AI 찾기 🎯</h1>
        <p class="text-slate-600">업무와 일상에서 나를 도와줄 최적의 AI 비서를 추천해 드립니다. (소요 시간: 약 3분)</p>
    </div>

    <div id="survey-container" class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden relative">
        <div class="p-1 sm:p-2 bg-gradient-to-r from-blue-500 to-purple-600"></div>
        <form id="survey-form" class="p-6 sm:p-10">
            
            <div class="mb-10 p-6 bg-blue-50/50 rounded-xl border border-blue-100 shadow-sm">
                <label for="userName" class="block text-lg font-bold text-slate-800 mb-2">
                    성함 및 직급 <span class="text-blue-600">*</span>
                </label>
                <p class="text-sm text-slate-600 mb-4">맞춤형 AI 추천 및 원활한 진단 진행을 위해 성함(과 직급)을 기재해 주세요.</p>
                <input type="text" id="userName" name="userName" required placeholder="예: 홍길동 대리, 김철수 팀장, 혹은 실명만" class="w-full p-4 rounded-xl border-2 border-slate-200 bg-white text-slate-800 font-medium focus:border-blue-500 focus:outline-none transition-all duration-200">
            </div>

            <div id="questions-wrapper" class="space-y-10">
                </div>

            <div id="error-message" class="hidden mt-8 p-4 bg-red-50 text-red-600 rounded-lg text-sm font-medium text-center border border-red-100">
                성함을 입력하시고, 모든 문항에 응답해 주세요. (복수 응답 문항은 조건을 확인해 주세요)
            </div>

            <div class="mt-10 pt-6 border-t border-slate-100 flex justify-end">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl transition duration-200 shadow-md flex items-center gap-2">
                    <span>제출하고 결과 보기</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <div id="loading-container" class="hidden w-full max-w-3xl bg-white rounded-2xl shadow-xl p-16 text-center">
        <div class="inline-block w-16 h-16 border-4 border-slate-200 border-solid rounded-full loader mb-4"></div>
        <h2 class="text-xl font-bold text-slate-800">응답을 분석하고 있습니다...</h2>
        <p class="text-slate-500 mt-2">최적의 AI 서비스를 탐색 중입니다.</p>
    </div>

    <div id="result-container" class="hidden w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden relative">
        <div class="p-1 sm:p-2 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
        <div class="p-6 sm:p-10">
            <h2 class="text-2xl font-bold text-slate-900 mb-2 flex items-center gap-2">
                <span>🎉 진단 완료!</span>
            </h2>
            <p id="result-greeting" class="text-lg font-medium text-emerald-600 mb-4"></p>
            <p class="text-slate-600 mb-6">아래
